name = "balance-sheet-worker"
main = "src/index.ts"
compatibility_date = "2026-06-25"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB"
database_name = "balance-sheet-db"
# Local-only placeholder. Remote commands use wrangler.deploy.toml.template
# and inject D1_DATABASE_ID from the build environment.
database_id = "00000000-0000-0000-0000-000000000000"
migrations_dir = "drizzle"
