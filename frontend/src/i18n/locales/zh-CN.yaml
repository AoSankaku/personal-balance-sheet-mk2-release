jsoncPlNote1: 收入金额 = 期间内 SUM(贷方) - SUM(借方)。
jsoncPlNote2: 支出金额 = 期间内 SUM(借方) - SUM(贷方)。
jsoncPlNote3: 金额为 0 的账户也包含在内。
jsoncNetIncomeComment: 净利润 = 总收入 - 总支出
jsoncDeprSectionTitle: 折旧进度
jsoncDeprNote1: 简化家庭折旧：每月分录 借：折旧费 / 贷：资产。
jsoncDeprNote2: 账面价值 = 总额 - 累计折旧 ← 与资产负债表上的资产余额一致。
jsoncDeprNote3: 进度百分比 = 累计折旧 / 总额 × 100（截断取整）
